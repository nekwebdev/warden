name: Auto-label issues by package

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Apply package labels
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const currentLabels = context.payload.issue.labels.map(label => label.name);
            // Keep in sync with GitHub issue/PR package lists, README.md, and root AGENTS.md.
            const packages = [
              'warden',
              'run-warden',
              'pi-warden',
              'fresh-skill',
              'warden-flow',
              'warden-panel',
              'warden-subagents',
              'warden-theme',
              'warden-web',
              'nix-warden',
              'dev-warden',
            ];
            const managedLabels = packages.map(pkg => `pkg:${pkg}`);

            function escapeRegExp(value) {
              return value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }

            function issueFormField(markdown, label) {
              const pattern = new RegExp(
                `(?:^|\\n)###\\s+${escapeRegExp(label)}\\s*\\n([\\s\\S]*?)(?=\\n###\\s+|$)`,
                'i'
              );
              const match = markdown.match(pattern);
              return match ? match[1].trim() : '';
            }

            const packageText =
              issueFormField(body, 'Package or area') || issueFormField(body, 'Package');

            if (!packageText) {
              core.info('No package field found; leaving package labels unchanged.');
              return;
            }

            const selectedPackages = new Set(
              packageText
                .split(/[\n,]+/)
                .map(value => value.replace(/^[-*]\s*/, '').trim())
                .filter(Boolean)
            );
            const wantedLabels = packages
              .filter(pkg => selectedPackages.has(pkg))
              .map(pkg => `pkg:${pkg}`);
            const labelsToAdd = wantedLabels.filter(label => !currentLabels.includes(label));
            const labelsToRemove = currentLabels.filter(
              label => managedLabels.includes(label) && !wantedLabels.includes(label)
            );

            async function ensureLabel(label) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label,
                    color: '7057ff',
                    description: label.replace('pkg:', 'Warden package/area: '),
                  });
                } catch (createError) {
                  if (createError.status !== 422) throw createError;
                }
              }
            }

            for (const label of labelsToAdd) {
              await ensureLabel(label);
            }

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labelsToAdd,
              });
            }

            for (const label of labelsToRemove) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: label,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }
