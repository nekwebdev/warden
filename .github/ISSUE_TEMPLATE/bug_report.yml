name: Bug Report
description: Report a bug in Warden or a Warden ecosystem package/area
labels: ["bug"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package or area
      description: Which Warden ecosystem unit is affected? Select all that apply; use Not package-specific for broad docs, hygiene, or uncertain scope.
      multiple: true
      options:
        - warden
        - run-warden
        - pi-warden
        - warden-flow
        - warden-panel
        - warden-subagents
        - warden-theme
        - warden-web
        - nix-warden
        - dev-warden
        - Not package-specific
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Package version, Warden commit, or relevant `warden doctor` / `./warden doctor` output.
      placeholder: "e.g. @nekwebdev/warden-flow 0.1.0, warden commit abd61e3, or doctor output"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal commands, inputs, and files needed to reproduce the behavior.
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, shell, Pi version, Warden command, agent cwd, WARDEN_HOME, WARDEN_AGENTS, package install source.
      placeholder: |
        OS:
        Shell:
        Pi version:
        Warden command:
        Agent cwd:
        WARDEN_HOME:
        WARDEN_AGENTS:
        Package install source:
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Relevant logs, screenshots, links, or notes.
    validations:
      required: false
